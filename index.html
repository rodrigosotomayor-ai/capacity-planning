<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capacity App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; transition: background 0.3s; }

    /* Dark mode (default) */
    html, html[data-theme="dark"] {
      background: #070714;
    }
    html[data-theme="dark"] body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(57,18,250,0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(57,18,250,0.2) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* Light mode */
    html[data-theme="light"] {
      background: #F0F4F8;
    }
    html[data-theme="light"] body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 10%, rgba(57,18,250,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(57,18,250,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body {
      font-family: Montserrat, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    #root {
      position: relative;
      z-index: 1;
      padding: 16px;
      min-height: 100vh;
    }

    /* Smooth theme transitions */
    *, *::before, *::after {
      transition: background-color 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }
    /* Disable transition for animations/transforms */
    [style*="transform"], [style*="animation"] {
      transition: none !important;
    }

    /* Scrollbar light mode */
    html[data-theme="light"] ::-webkit-scrollbar { width: 6px; height: 6px; }
    html[data-theme="light"] ::-webkit-scrollbar-track { background: rgba(0,0,0,0.04); }
    html[data-theme="light"] ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
    html[data-theme="dark"] ::-webkit-scrollbar { width: 6px; height: 6px; }
    html[data-theme="dark"] ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
    html[data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

    /* Date input light mode */
    html[data-theme="light"] input[type="date"] { color-scheme: light; }
    html[data-theme="dark"]  input[type="date"] { color-scheme: dark; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
